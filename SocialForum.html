.forum-input input, .forum-input textarea {

<div class="container">
    <h2 style=" font-size: 48px; text-align: center;"><b>SOCIAL FORUM</b></h2>
    <div class="box">
        
        <p>Chat with other astronomy enthusiasts!</p>

        <div id="messages" class="forum-messages"></div>

        <div class="forum-input">
            <input type="text" id="username" placeholder="Your name">
            <textarea id="message" placeholder="Write a message..."></textarea>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script type="module">
    import { 
        initializeApp 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import { 
        getDatabase, ref, push, onChildAdded, update 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    /* ------------------ FIREBASE CONFIG ------------------ */
    const firebaseConfig = {
        apiKey: "AIzaSyAprPn8Zqg_YUFetfa0X8Hkyv0QvrXyLks",
        authDomain: "astrohub-forum.firebaseapp.com",
        databaseURL: "https://astrohub-forum-default-rtdb.firebaseio.com",
        projectId: "astrohub-forum",
        storageBucket: "astrohub-forum.firebasestorage.app",
        messagingSenderId: "237719612492",
        appId: "1:237719612492:web:45cb87f6a8bcc961cf58e9",
        measurementId: "G-HXVDYLDFRS"
    };


    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, "forumMessages");

    /* ------------------ SEND MAIN MESSAGE ------------------ */
    window.sendMessage = function () {
        const username = document.getElementById("username").value.trim();
        const message = document.getElementById("message").value.trim();

        if (!username || !message) return;

        push(messagesRef, {
            user: username,
            text: message,
            time: Date.now(),
            replies: {}
        });

        document.getElementById("message").value = "";
    };

    /* ------------------ SEND REPLY ------------------ */
    window.sendReply = function (parentId) {
        const replyUser = prompt("Your name:");
        const replyText = prompt("Your reply:");

        if (!replyUser || !replyText) return;

        const replyRef = ref(db, `forumMessages/${parentId}/replies`);
        push(replyRef, {
            user: replyUser,
            text: replyText,
            time: Date.now()
        });
    };

    /* ------------------ DISPLAY MESSAGES ------------------ */
    onChildAdded(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        const msgId = snapshot.key;

        const box = document.getElementById("messages");

        const div = document.createElement("div");
        div.classList.add("message");
        div.style.marginBottom = "20px";

        div.innerHTML = `
            <strong>${msg.user}</strong>: ${msg.text}
            <br>
            <button onclick="sendReply('${msgId}')"
                style="margin-top:8px; background:#C7B6F2; border:none; padding:5px 10px; border-radius:6px; cursor:pointer;">
                Reply
            </button>
            <div id="replies-${msgId}" style="margin-left:20px; margin-top:10px;"></div>
        `;

        box.appendChild(div);

        /* ------------------ DISPLAY REPLIES ------------------ */
        const repliesRef = ref(db, `forumMessages/${msgId}/replies`);
        onChildAdded(repliesRef, (replySnap) => {
            const reply = replySnap.val();
            const replyBox = document.getElementById(`replies-${msgId}`);

            const replyDiv = document.createElement("div");
            replyDiv.style.marginBottom = "10px";
            replyDiv.innerHTML = `<strong>${reply.user}</strong>: ${reply.text}`;

            replyBox.appendChild(replyDiv);
        });

        box.scrollTop = box.scrollHeight;      
    });
</script>
