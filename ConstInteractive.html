<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Orion Constellation</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0b0f26;
        color: white;
        text-align: center;
        padding: 20px;
    }

    .constellation-container {
        position: relative;
        width: 600px;
        margin: 0 auto;
    }

    .constellation-img {
        width: 100%;
        border-radius: 10px;
    }

    .star {
        position: absolute;
        width: 18px;
        height: 18px;
        background: rgb(183, 45, 45);
        border-radius: 50%;
        cursor: pointer;
        transform: translate(-50%, -50%);
        transition: 0.2s;
    }

    .star:hover {
        box-shadow: 0 0 4px 2px #93c0f6;
    }

    .tooltip {
        position: absolute;
        background: rgba(0,0,0,0.8);
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 14px;
        white-space: nowrap;
        transform: translate(-50%, -140%);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
    }

    .star:hover .tooltip {
        opacity: 1;
    }

    .star {
        position: absolute;
        width: 18px;
        height: 18px;
        background: white, transparent 90%;
        border-radius: 50%;
        cursor: pointer;
        transform: translate(-50%, -50%);
        transition: 0.2s;
    }
</style>
</head>

<body>

<h1>Explore the Orion Constellation</h1>
 <div class="constellation-container">        
        <div class="image-block">             
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Orion_IAU.svg/960px-Orion_IAU.svg.png" alt="Orion constellation diagram">         
            <div class="star" style="top: 43%; left: 42.8%;" onclick="showFacts('Betelgeuse')"><div class="tooltip">Betelgeuse</div></div>
            <div class="star" style="top: 65.7%; left: 54.9%;" onclick="showFacts('Rigel')"><div class="tooltip">Rigel</div></div>
            <div class="star" style="top: 44.6%; left: 52%;" onclick="showFacts('Bellatrix')"><div class="tooltip">Bellatrix</div></div>
            <div class="star" style="top: 56.3%; left: 46.8%;" onclick="showFacts('Alnitak')"><div class="tooltip">Alnitak</div></div>
            <div class="star" style="top: 55.3%; left: 48%;" onclick="showFacts('Alnilam')"><div class="tooltip">Alnilam</div></div>
            <div class="star" style="top: 54%; left: 49.5%;" onclick="showFacts('Mintaka')"><div class="tooltip">Mintaka</div></div>
            <div class="star" style="top: 68%; left: 45%;" onclick="showFacts('Saiph')"><div class="tooltip">Saiph</div></div>
        </div>   
    </div>


<div id="star-facts">
    Hover over a star, then click it to learn more.
</div>

<script>
    function showFacts(star) {
        const facts = {
            "Betelgeuse": "Betelgeuse is a red supergiant nearing the end of its life. It may go supernova within the next million years.",
            "Rigel": "Rigel is a blue supergiant and the brightest star in Orion. It shines about 120,000 times brighter than the Sun.",
            "Bellatrix": "Bellatrix is a hot blue giant known as the Amazon Star. It is around 240 light-years away.",
            "Alnitak": "Alnitak is a triple star system and the easternmost star in Orion's Belt.",
            "Alnilam": "Alnilam is a massive blue supergiant about 2,000 light-years away and the middle star of Orion's Belt.",
            "Mintaka": "Mintaka is a multiple star system and the westernmost star of Orion's Belt.",
            "Saiph": "Saiph is a blue supergiant and the sixth brightest star in Orion. It is located about 650 light-years away."
        };

        document.getElementById("star-facts").innerText = facts[star];
    }
</script>

</body>
</html>
